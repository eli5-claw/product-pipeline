version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: artl-postgres
    environment:
      POSTGRES_USER: artl
      POSTGRES_PASSWORD: artl_password
      POSTGRES_DB: artl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artl"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: artl-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # API Server (NestJS)
  api:
    build:
      context: ./src/api
      dockerfile: Dockerfile
    container_name: artl-api
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://artl:artl_password@postgres:5432/artl
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-jwt-secret-key-change-in-production
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
    ports:
      - "3001:3001"
    volumes:
      - ./src/api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run start:dev

  # Web Frontend (Next.js)
  web:
    build:
      context: ./src/web
      dockerfile: Dockerfile
    container_name: artl-web
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
    ports:
      - "3000:3000"
    volumes:
      - ./src/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    command: npm run dev

  # MCP Server
  mcp:
    build:
      context: ./src/mcp
      dockerfile: Dockerfile
    container_name: artl-mcp
    environment:
      NODE_ENV: development
      API_URL: http://api:3001
      API_KEY: ${MCP_API_KEY:-mcp-dev-key}
    ports:
      - "3002:3002"
    volumes:
      - ./src/mcp:/app
      - /app/node_modules
    depends_on:
      - api
    command: npm run dev

volumes:
  postgres_data:
  redis_data: